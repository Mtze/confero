services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: confero
      POSTGRES_USER: confero
      POSTGRES_PASSWORD: confero
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confero"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

  server:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    environment:
      CONFERO_DATABASE_URL: postgres://confero:confero@postgres:5432/confero?sslmode=disable
      CONFERO_HTTP_ADDR: :8080
      CONFERO_OIDC_ISSUER_URL: http://keycloak:8080/realms/confero
      CONFERO_OIDC_CLIENT_ID: confero
      CONFERO_OIDC_CLIENT_SECRET: confero-secret
      CONFERO_OIDC_REDIRECT_URL: http://localhost:8080/auth/callback
      CONFERO_OIDC_MEMBER_VALUE: cs-edu-chair
      CONFERO_OIDC_ADMIN_VALUE: cs-edu-chair-admin
      CONFERO_SESSION_SECRET: "change-me-in-production-min32bytes!"
      CONFERO_SMTP_ADDR: mailhog:1025
      CONFERO_SMTP_FROM: confero@example.org
      CONFERO_PUBLIC_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
