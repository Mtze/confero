image:
  server:
    repository: ghcr.io/mtze/confero-server
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/mtze/confero-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent

server:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env: {}

web:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  className: nginx
  host: confero.example.org
  tls:
    enabled: true
    secretName: confero-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

oidc:
  issuerURL: https://keycloak.example.org/realms/confero
  clientID: confero
  clientSecretRef:
    name: confero-oidc
    key: client-secret
  memberValue: cs-edu-chair
  adminValue: cs-edu-chair-admin

smtp:
  addr: ""
  from: ""
  usernameRef:
    name: ""
    key: ""
  passwordRef:
    name: ""
    key: ""

session:
  secretRef:
    name: confero-session
    key: secret

publicBaseURL: https://confero.example.org

postgres:
  enabled: true
  instances: 1
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

networkPolicy:
  enabled: false

nameOverride: ""
fullnameOverride: ""
