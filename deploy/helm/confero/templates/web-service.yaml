apiVersion: v1
kind: Service
metadata:
  name: {{ include "confero.fullname" . }}-web
  labels:
    {{- include "confero.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "confero.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
