{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "confero.fullname" . }}
  labels:
    {{- include "confero.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "confero.fullname" . }}-server
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "confero.fullname" . }}-server
                port:
                  number: 8080
          - path: /calendar
            pathType: Prefix
            backend:
              service:
                name: {{ include "confero.fullname" . }}-server
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "confero.fullname" . }}-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "confero.fullname" . }}-web
                port:
                  number: 8080
{{- end }}
