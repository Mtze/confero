openapi: 3.1.0
info:
  title: Confero API
  description: Conference tracking API for the TUM CS Education chair.
  version: 0.1.0
  contact:
    name: CS Education Chair, TU München
  license:
    name: MIT
    identifier: MIT
servers:
  - url: /
    description: Same-origin (proxied by ingress in production)

security: []

tags:
  - name: infra
    description: Infrastructure endpoints (health, readiness, metrics)
  - name: users
    description: Authenticated user profile

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness check
      description: Returns 200 when the process is running. Used as the Kubernetes liveness probe.
      tags: [infra]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /api/v1/me:
    get:
      operationId: getMe
      summary: Current user profile
      description: Returns the authenticated user's profile and role list.
      tags: [users]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session

  responses:
    Unauthorized:
      description: Authentication required or token invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    CurrentUser:
      type: object
      required:
        - id
        - email
        - name
        - roles
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [member, admin]

    ProblemDetail:
      type: object
      properties:
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
