openapi: 3.0.3
info:
  title: Confero API
  description: Conference tracking API for the TUM CS Education chair.
  version: 0.1.0
  contact:
    name: CS Education Chair, TU München
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /
    description: Same-origin (proxied by ingress in production)

security: []

tags:
  - name: infra
    description: Infrastructure endpoints (health, readiness, metrics)
  - name: users
    description: Authenticated user profile
  - name: conferences
    description: Conference catalog management
  - name: stars
    description: Per-user conference stars (submission intent)
  - name: tags
    description: Conference tags (autocomplete source)
  - name: tracks
    description: Conference submission track types
  - name: calendar
    description: ICS calendar feeds and token management
  - name: admin
    description: Admin-only endpoints (audit log)

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness check
      description: Returns 200 when the process is running. Used as the Kubernetes liveness probe.
      tags: [infra]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /api/v1/me:
    get:
      operationId: getMe
      summary: Current user profile
      description: Returns the authenticated user's profile and role list.
      tags: [users]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/conferences:
    get:
      operationId: listConferences
      summary: List conferences
      description: >
        Returns the conference catalog. Public endpoint — no authentication required.
        By default, archived conferences are excluded.
      tags: [conferences]
      parameters:
        - name: archived
          in: query
          description: Include archived conferences when true.
          schema:
            type: boolean
            default: false
        - name: tag
          in: query
          description: Filter by tag slug.
          schema:
            type: string
        - name: track
          in: query
          description: Filter by track code.
          schema:
            type: string
        - name: q
          in: query
          description: Free-text search on name and acronym (case-insensitive).
          schema:
            type: string
      responses:
        '200':
          description: List of conferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conference'

    post:
      operationId: createConference
      summary: Create a conference
      description: Creates a new conference. Requires member role.
      tags: [conferences]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConferenceInput'
      responses:
        '201':
          description: Conference created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/conferences/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: getConference
      summary: Get a conference
      description: Returns a single conference by ID. Public endpoint.
      tags: [conferences]
      responses:
        '200':
          description: Conference found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conference'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateConference
      summary: Update a conference
      description: Replaces all editable fields of a conference. Requires member role.
      tags: [conferences]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConferenceInput'
      responses:
        '200':
          description: Conference updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      operationId: deleteConference
      summary: Delete a conference
      description: Permanently deletes a conference and all associated data. Requires admin role.
      tags: [conferences]
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Conference deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conferences/{id}/archive:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: archiveConference
      summary: Archive a conference
      description: Sets archived_at on the conference. Idempotent. Requires member role.
      tags: [conferences]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Conference archived (or was already archived)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conference'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conferences/{id}/unarchive:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: unarchiveConference
      summary: Unarchive a conference
      description: Clears archived_at on the conference. Idempotent. Requires member role.
      tags: [conferences]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Conference unarchived (or was already active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conference'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conferences/{id}/stars:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: starConference
      summary: Star a conference
      description: Marks the authenticated user's intent to submit to this conference. Idempotent. Requires member role.
      tags: [stars]
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Conference starred (or was already starred)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: unstarConference
      summary: Unstar a conference
      description: Removes the authenticated user's star from this conference. Idempotent. Requires member role.
      tags: [stars]
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Conference unstarred (or was not starred)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/me/stars:
    get:
      operationId: listMyStars
      summary: List my starred conferences
      description: Returns all conferences the authenticated user has starred, sorted by next upcoming deadline.
      tags: [stars]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: List of starred conferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conference'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me/settings:
    get:
      operationId: getMySettings
      summary: Get my reminder settings
      description: Returns the authenticated user's reminder and digest preferences.
      tags: [users]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateMySettings
      summary: Update my reminder settings
      description: Replaces the authenticated user's reminder and digest preferences. Re-materializes pending reminders with the new lead times.
      tags: [users]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsInput'
      responses:
        '200':
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tags:
    get:
      operationId: listTags
      summary: List all tags
      description: Returns all tags for use in the conference form autocomplete. Requires authentication.
      tags: [tags]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tracks:
    get:
      operationId: listTracks
      summary: List all track types
      description: Returns the closed set of submission track types. Requires authentication.
      tags: [tracks]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /calendar/all.ics:
    get:
      operationId: getPublicCalendar
      summary: Public ICS calendar feed
      description: All non-archived conferences as RFC 5545 iCalendar. Supports conditional GET via ETag.
      tags: [calendar]
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: iCalendar stream
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            text/calendar:
              schema:
                type: string
        '304':
          description: Not modified

  /calendar/u/{token}.ics:
    get:
      operationId: getPersonalCalendar
      summary: Personal ICS calendar feed
      description: Starred conferences for the user identified by the calendar token.
      tags: [calendar]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: iCalendar stream
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            text/calendar:
              schema:
                type: string
        '304':
          description: Not modified
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/me/calendar-tokens:
    get:
      operationId: listMyCalendarTokens
      summary: List calendar tokens
      description: Returns the authenticated user's active calendar token(s).
      tags: [calendar]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Active calendar tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCalendarToken
      summary: Create or replace a calendar token
      description: Generates a new personal calendar token and revokes any existing active token of the same kind.
      tags: [calendar]
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Newly created token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteCalendarToken
      summary: Revoke calendar token
      description: Revokes the authenticated user's active calendar token.
      tags: [calendar]
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/audit-log:
    get:
      operationId: listAuditLog
      summary: Query the audit log
      description: Returns audit log entries. Admin only.
      tags: [admin]
      security:
        - sessionCookie: []
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: actor
          in: query
          description: Filter by actor OIDC subject.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: before
          in: query
          description: Cursor - return entries before this timestamp.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/import:
    post:
      operationId: importConferences
      summary: Bulk import conferences from YAML
      description: Upserts a list of conferences from a YAML document. Member only.
      tags: [conferences]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          text/x-yaml:
            schema:
              type: string
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session

  responses:
    Unauthorized:
      description: Authentication required or token invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    BadRequest:
      description: Request body failed validation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: Resource already exists (e.g. duplicate acronym+year)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  schemas:
    CalendarToken:
      type: object
      required: [id, token, kind, created_at, feed_url]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          description: Opaque bearer token used in the feed URL.
        kind:
          type: string
          enum: [personal_starred]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        feed_url:
          type: string
          description: Full URL of the personal ICS feed for this token.

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    CurrentUser:
      type: object
      required:
        - id
        - email
        - name
        - roles
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [member, admin]

    Conference:
      type: object
      required:
        - id
        - name
        - acronym
        - year
        - location
        - tags
        - tracks
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        year:
          type: integer
        location:
          type: string
        website_url:
          type: string
          nullable: true
        cfp_url:
          type: string
          nullable: true
        primary_deadline:
          type: string
          format: date-time
          nullable: true
        abstract_deadline:
          type: string
          format: date-time
          nullable: true
        notification_date:
          type: string
          format: date-time
          nullable: true
        camera_ready_date:
          type: string
          format: date-time
          nullable: true
        event_start_date:
          type: string
          format: date
          nullable: true
        event_end_date:
          type: string
          format: date
          nullable: true
        core_rank:
          type: string
          enum: ["A*", "A", "B", "C", "Unranked"]
          nullable: true
        h5_index:
          type: integer
          nullable: true
        acceptance_rate_pct:
          type: number
          nullable: true
        dblp_key:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'

    ConferenceInput:
      type: object
      required:
        - name
        - acronym
        - year
        - location
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        acronym:
          type: string
          minLength: 1
          maxLength: 50
        year:
          type: integer
          minimum: 2000
          maximum: 2100
        location:
          type: string
          minLength: 1
        website_url:
          type: string
          nullable: true
        cfp_url:
          type: string
          nullable: true
        primary_deadline:
          type: string
          format: date-time
          nullable: true
        abstract_deadline:
          type: string
          format: date-time
          nullable: true
        notification_date:
          type: string
          format: date-time
          nullable: true
        camera_ready_date:
          type: string
          format: date-time
          nullable: true
        event_start_date:
          type: string
          format: date
          nullable: true
        event_end_date:
          type: string
          format: date
          nullable: true
        core_rank:
          type: string
          enum: ["A*", "A", "B", "C", "Unranked"]
          nullable: true
        h5_index:
          type: integer
          minimum: 0
          nullable: true
        acceptance_rate_pct:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        dblp_key:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        tag_slugs:
          type: array
          items:
            type: string
          description: >
            Tag slugs to associate with the conference.
            Unknown slugs cause a new tag to be created using the slug as both slug and name.
        track_codes:
          type: array
          items:
            type: string
          description: Track codes to associate with the conference.

    Tag:
      type: object
      required:
        - id
        - slug
        - name
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string

    Track:
      type: object
      required:
        - code
        - display_name
        - sort_order
      properties:
        code:
          type: string
        display_name:
          type: string
        sort_order:
          type: integer

    UserSettings:
      type: object
      required:
        - timezone
        - reminder_lead_days
        - weekly_digest_enabled
        - weekly_digest_day
        - weekly_digest_hour
        - weekly_digest_horizon_weeks
      properties:
        timezone:
          type: string
          description: IANA timezone name.
          example: Europe/Berlin
        reminder_lead_days:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 365
          maxItems: 10
          description: Days before each deadline to send a reminder email.
          example: [28, 14, 7, 1]
        weekly_digest_enabled:
          type: boolean
          description: Whether to receive a weekly digest of upcoming deadlines.
        weekly_digest_day:
          type: integer
          minimum: 0
          maximum: 6
          description: Day of week for the digest (0=Sunday … 6=Saturday).
        weekly_digest_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Hour of day (in user timezone) to send the digest.
        weekly_digest_horizon_weeks:
          type: integer
          minimum: 1
          maximum: 52
          description: How many weeks ahead to include in the weekly digest.

    UserSettingsInput:
      type: object
      required:
        - timezone
        - reminder_lead_days
        - weekly_digest_enabled
        - weekly_digest_day
        - weekly_digest_hour
        - weekly_digest_horizon_weeks
      properties:
        timezone:
          type: string
          example: Europe/Berlin
        reminder_lead_days:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 365
          maxItems: 10
          example: [28, 14, 7, 1]
        weekly_digest_enabled:
          type: boolean
        weekly_digest_day:
          type: integer
          minimum: 0
          maximum: 6
        weekly_digest_hour:
          type: integer
          minimum: 0
          maximum: 23
        weekly_digest_horizon_weeks:
          type: integer
          minimum: 1
          maximum: 52

    AuditEntry:
      type: object
      required: [id, action, entity_type, entity_id, actor_display_name, actor_oidc_subject, created_at]
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [create, update, delete, archive, unarchive]
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
          nullable: true
        actor_display_name:
          type: string
        actor_oidc_subject:
          type: string
        created_at:
          type: string
          format: date-time

    ImportResult:
      type: object
      required: [created, updated, skipped]
      properties:
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    ProblemDetail:
      type: object
      properties:
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
