version: "2"

run:
  timeout: 5m
  modules-download-mode: mod

linters:
  enable:
    - misspell
    - revive
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
  max-same-issues: 3
